services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sku_lens}
      MYSQL_USER: ${MYSQL_USER:-sku}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD in .env}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}
    volumes:
      - type: bind
        source: ${SKU_LENS_DATA_DIR:-./var/data}/mysql
        target: /var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$${MYSQL_ROOT_PASSWORD}\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped
    logging: &default-logging
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - type: bind
        source: ${SKU_LENS_DATA_DIR:-./var/data}/redis
        target: /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 12
    restart: unless-stopped
    logging: *default-logging

  server:
    image: sku-lens-server:${SKU_LENS_VERSION:-local}
    build:
      context: .
      dockerfile: Dockerfile
      target: server
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment: &server-environment
      SKU_LENS_ENV: ${SKU_LENS_ENV:-local}
      DATABASE_URL: mysql+aiomysql://${MYSQL_USER:-sku}:${MYSQL_PASSWORD:?set MYSQL_PASSWORD in .env}@mysql:3306/${MYSQL_DATABASE:-sku_lens}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      SHOPIFY_API_KEY: ${SHOPIFY_API_KEY:?set SHOPIFY_API_KEY in .env}
      SHOPIFY_API_SECRET: ${SHOPIFY_API_SECRET:?set SHOPIFY_API_SECRET in .env}
      SHOPIFY_SCOPES: ${SHOPIFY_SCOPES:?set SHOPIFY_SCOPES in .env}
      SHOPIFY_APP_URL: ${SHOPIFY_APP_URL:?set SHOPIFY_APP_URL in .env}
      SHOPIFY_WEBHOOK_BASE_URL: ${SHOPIFY_WEBHOOK_BASE_URL:?set SHOPIFY_WEBHOOK_BASE_URL in .env}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com/v1}
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET:?set INGEST_SHARED_SECRET in .env}
      INGEST_TOKEN_TTL_SECONDS: ${INGEST_TOKEN_TTL_SECONDS:-300}
      SKU_LENS_LOG_LEVEL: ${SKU_LENS_LOG_LEVEL:-INFO}
      SKU_LENS_INTERNAL_REVIEW: ${SKU_LENS_INTERNAL_REVIEW:-0}
    command:
      [
        "uvicorn",
        "main:create_app",
        "--factory",
        "--no-access-log",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--workers",
        "${SERVER_WORKERS:-2}",
      ]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/healthz').read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    init: true
    ports:
      - "${SERVER_BIND_HOST:-127.0.0.1}:${SERVER_PORT:-8000}:8000"
    restart: unless-stopped
    logging: *default-logging

  worker:
    image: sku-lens-server:${SKU_LENS_VERSION:-local}
    build:
      context: .
      dockerfile: Dockerfile
      target: server
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment: *server-environment
    command:
      [
        "celery",
        "--app",
        "celery_app:celery_app",
        "worker",
        "--loglevel",
        "${SKU_LENS_LOG_LEVEL:-INFO}",
        "--queues",
        "sku-lens:rollups,sku-lens:diagnoses",
      ]
    init: true
    restart: unless-stopped
    logging: *default-logging

  worker-beat:
    image: sku-lens-server:${SKU_LENS_VERSION:-local}
    build:
      context: .
      dockerfile: Dockerfile
      target: server
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment: *server-environment
    command:
      [
        "celery",
        "--app",
        "celery_app:celery_app",
        "beat",
        "--loglevel",
        "${SKU_LENS_LOG_LEVEL:-INFO}",
        "--schedule",
        "/var/lib/celery/celerybeat-schedule",
      ]
    init: true
    volumes:
      - type: bind
        source: ${SKU_LENS_DATA_DIR:-./var/data}/celerybeat
        target: /var/lib/celery
    restart: unless-stopped
    logging: *default-logging

  web:
    image: sku-lens-web:${SKU_LENS_VERSION:-local}
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    depends_on:
      server:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
      SERVER_API_URL: http://server:8000
      SHOPIFY_API_KEY: ${SHOPIFY_API_KEY:?set SHOPIFY_API_KEY in .env}
    command: ["npm", "run", "start"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/healthz').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    init: true
    ports:
      - "${WEB_BIND_HOST:-127.0.0.1}:${WEB_PORT:-3000}:3000"
    restart: unless-stopped
    logging: *default-logging
